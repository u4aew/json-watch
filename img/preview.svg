<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="white"/>

  <!-- double border -->
  <rect x="4"  y="4"  width="392" height="392" fill="none" stroke="black" stroke-width="2"/>
  <rect x="8"  y="8"  width="384" height="384" fill="none" stroke="black" stroke-width="2"/>

  <!-- { -->
  <text x="24" y="40"  font-family="monospace" font-size="16" fill="black">{</text>

  <!-- "time": -->
  <text x="44" y="64"  font-family="monospace" font-size="16" fill="black">"time":</text>

  <!-- inverted time block -->
  <rect x="20" y="68" width="360" height="80" fill="black"/>
  <text x="200" y="128" font-family="monospace" font-size="52" fill="white"
        text-anchor="middle" dominant-baseline="auto">13:45</text>

  <!-- fields -->
  <text x="44" y="182" font-family="monospace" font-size="16" fill="black">"day":  "Mon",</text>
  <text x="44" y="206" font-family="monospace" font-size="16" fill="black">"date": "2026-03-04",</text>
  <text x="44" y="230" font-family="monospace" font-size="16" fill="black">"bat":  87% [######....],</text>
  <text x="44" y="254" font-family="monospace" font-size="16" fill="black">"steps": 4231</text>

  <!-- } -->
  <text x="24" y="290" font-family="monospace" font-size="16" fill="black">}</text>

  <!-- separator -->
  <line x1="24" y1="318" x2="376" y2="318" stroke="black" stroke-width="2"/>

  <!-- comment -->
  <text x="24" y="348" font-family="monospace" font-size="16" fill="black">// JsonWatch v2.0</text>
</svg>
